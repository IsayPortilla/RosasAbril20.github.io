<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Victoria Mística</title>
    <style>
        :root {
            --primary-purple: #6a0dad;
            --magic-glow: #bc13fe;
            --gold-accent: #c89b3c;
            --dark-bg: #050505;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--dark-bg);
            font-family: 'Trebuchet MS', sans-serif;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Fondo dinámico */
        #canvas-bg {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 10;
            text-align: center;
            background: rgba(15, 5, 25, 0.85);
            padding: 30px;
            border-radius: 15px;
            border: 2px solid var(--gold-accent);
            box-shadow: 0 0 40px rgba(188, 19, 254, 0.4);
            max-width: 450px;
            backdrop-filter: blur(8px);
            animation: fadeIn 1.5s ease-out;
        }

        h1 {
            color: var(--gold-accent);
            font-size: 2.2rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin: 0;
            text-shadow: 0 0 15px var(--magic-glow);
        }

        .subtitle {
            color: #a084ff;
            font-size: 0.9rem;
            margin-bottom: 20px;
            letter-spacing: 1px;
        }

        /* Rejilla de Rosas */
        .rose-garden {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px;
            margin: 20px 0;
            padding: 10px;
        }

        .rose-item {
            font-size: 2.5rem;
            cursor: pointer;
            user-select: none;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), filter 0.3s;
            filter: drop-shadow(0 0 5px var(--magic-glow));
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .rose-item:hover {
            transform: scale(1.3) rotate(10deg);
            filter: drop-shadow(0 0 15px var(--gold-accent));
        }

        .rose-item.clicked {
            animation: pulse 0.5s ease;
        }

        /* Cuadro de Mensaje */
        #message-box {
            min-height: 60px;
            margin-top: 15px;
            font-size: 1.1rem;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            text-shadow: 0 0 8px var(--magic-glow);
        }

        /* Botón estilo League of Legends */
        .btn-action {
            background: #1e2328;
            color: var(--gold-accent);
            border: 1px solid var(--gold-accent);
            padding: 12px 24px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
            box-shadow: inset 0 0 10px rgba(200, 155, 60, 0.2);
        }

        .btn-action:hover {
            background: var(--gold-accent);
            color: #000;
            box-shadow: 0 0 20px var(--gold-accent);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.5); }
            100% { transform: scale(1.3); }
        }

        /* Pétalos */
        .petal {
            position: absolute;
            background-color: var(--magic-glow);
            border-radius: 150% 0 150% 0;
            pointer-events: none;
            z-index: 100;
        }
    </style>
</head>
<body>

    <canvas id="canvas-bg"></canvas>

    <div class="container">
        <h1>VICTORIA</h1>
        <div class="subtitle">Logro Desbloqueado: Persona Favorita</div>
        
        <div class="rose-garden" id="garden">
            </div>

        <div id="message-box">Toca una rosa para recibir un buff...</div>

        <button class="btn-action" onclick="skillCast()">Lluvia de Flores</button>
    </div>

    <script>
        const garden = document.getElementById('garden');
        const messageBox = document.getElementById('message-box');
        
        const phrases = [
            "¡Eres nivel 18 en mi corazón!",
            "Tu sonrisa brilla más que un Destello.",
            "Eres el carry de mi vida.",
            "¡Un Pentakill de alegría para ti!",
            "Tienes el buff de belleza infinito.",
            "Ni el Barón Nashor es tan valioso como tú.",
            "Eres mi skin mítica favorita.",
            "Tus ojos tienen más alcance que Caitlyn.",
            "¡GG! Qué suerte haberte conocido.",
            "Siempre serás mi dúo favorito."
        ];

        // Crear 20 rosas
        for (let i = 0; i < 20; i++) {
            const rose = document.createElement('div');
            rose.className = 'rose-item';
            rose.innerHTML = '🌹'; // Emoji para asegurar visibilidad
            
            rose.onclick = () => {
                // Efecto visual
                rose.classList.add('clicked');
                setTimeout(() => rose.classList.remove('clicked'), 500);
                
                // Cambiar mensaje
                const randomMsg = phrases[Math.floor(Math.random() * phrases.length)];
                messageBox.style.opacity = 0;
                setTimeout(() => {
                    messageBox.innerText = randomMsg;
                    messageBox.style.opacity = 1;
                }, 200);
            };
            
            garden.appendChild(rose);
        }

        // --- Partículas de fondo ---
        const canvas = document.getElementById('canvas-bg');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function init() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        class Particle {
            constructor() {
                this.reset();
            }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 0.5;
                this.speedX = (Math.random() - 0.5) * 0.5;
                this.speedY = (Math.random() - 0.5) * 0.5;
                this.alpha = Math.random();
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) this.reset();
            }
            draw() {
                ctx.fillStyle = `rgba(188, 19, 254, ${this.alpha})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        for (let i = 0; i < 80; i++) particles.push(new Particle());

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', init);
        init();
        animate();

        // --- Habilidad: Lluvia de flores ---
        function skillCast() {
            for(let i=0; i<20; i++) {
                const p = document.createElement('div');
                p.className = 'petal';
                p.style.left = Math.random() * 100 + 'vw';
                p.style.top = '-5vh';
                const size = Math.random() * 10 + 10;
                p.style.width = size + 'px';
                p.style.height = size + 'px';
                p.style.backgroundColor = Math.random() > 0.5 ? '#bc13fe' : '#6a0dad';
                p.style.boxShadow = '0 0 10px #bc13fe';
                
                const duration = Math.random() * 2 + 2;
                p.style.transition = `transform ${duration}s linear, opacity ${duration}s`;
                
                document.body.appendChild(p);

                // Animación simple de caída
                setTimeout(() => {
                    p.style.transform = `translate(${Math.random()*100 - 50}px, 110vh) rotate(${Math.random()*360}deg)`;
                    p.style.opacity = '0';
                }, 100);

                setTimeout(() => p.remove(), duration * 1000);
            }
        }
    </script>
</body>
</html>
